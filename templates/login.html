<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fit Folder – Login</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      /* Variables directly from your dashboard.html */
      :root {
        --bg: #0f0f0f;
        --surface: #181818;
        --border: #2a2a2a;
        --accent: #c8f135;
        --text: #f0f0f0;
        --muted: #666;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: "DM Sans", sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
      }

      .login-card {
        background: var(--surface);
        border: 1px solid var(--border);
        padding: 3rem;
        border-radius: 8px;
        width: 100%;
        max-width: 400px;
        text-align: center;
      }

      h2 {
        font-family: "Bebas Neue", sans-serif;
        font-size: 2.5rem;
        color: var(--accent);
        letter-spacing: 0.05em;
        margin-bottom: 2rem;
        text-transform: uppercase;
      }

      .input-group {
        margin-bottom: 1.25rem;
        text-align: left;
      }

      label {
        display: block;
        font-size: 0.75rem;
        color: var(--muted);
        margin-bottom: 0.5rem;
        text-transform: uppercase;
      }

      input {
        width: 100%;
        padding: 0.9rem;
        background: #222;
        border: 1px solid var(--border);
        color: var(--text);
        border-radius: 4px;
        font-family: "DM Sans", sans-serif;
        box-sizing: border-box;
      }

      input:focus {
        outline: none;
        border-color: var(--accent);
      }

      button[type="submit"] {
        width: 100%;
        padding: 1rem;
        background: var(--accent);
        color: #0f0f0f;
        border: none;
        border-radius: 4px;
        font-family: "DM Sans", sans-serif;
        font-weight: 600;
        cursor: pointer;
        text-transform: uppercase;
        margin-top: 1rem;
      }
    </style>
  </head>
  <body>
    <div class="login-card">
      <h2>Login</h2>
      <form method="POST" action="/login">
        <div class="input-group">
          <label>Username</label>
          <input
            type="text"
            name="username"
            placeholder="Enter username"
            required
          />
        </div>
        <div class="input-group">
          <label>Password</label>
          <input
            type="password"
            name="password"
            placeholder="Enter password"
            required
          />
        </div>
        <button type="submit">Log In</button>
      </form>
    </div>
  </body>
</html>
