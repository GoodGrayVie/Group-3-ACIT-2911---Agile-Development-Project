<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Log Workout</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 20px;
      }
      h2 {
        margin-top: 30px;
      }
      .set-row,
      .cardio-row {
        display: flex;
        gap: 10px;
        margin-bottom: 10px;
      }
      .set-row input,
      .cardio-row input,
      select {
        padding: 5px;
      }
      button {
        padding: 6px 12px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <h1>Log Workout</h1>

    <form method="POST">
      <!-- Workout Info -->
      <label>Workout Name:</label><br />
      <input type="text" name="name" required /><br /><br />

      <label>Date:</label><br />
      <input type="date" name="date" required /><br /><br />

      <label>Notes:</label><br />
      <textarea name="notes" rows="3" cols="40"></textarea>

      <hr />

      <!-- Strength Sets -->
      <h2>Strength Training</h2>

      <div id="strength-container"></div>

      <button type="button" onclick="addStrengthSet()">+ Add Set</button>

      <hr />

      <!-- Cardio -->
      <h2>Cardio</h2>

      <div id="cardio-container"></div>

      <button type="button" onclick="addCardio()">+ Add Cardio Entry</button>

      <hr />

      <button type="submit">Save Workout</button>
    </form>

    <script>
      function addStrengthSet() {
        const container = document.getElementById("strength-container");

        const row = document.createElement("div");
        row.className = "set-row";

        row.innerHTML = `
            <select name="exercise_id[]" required>
                <option value="">Select Exercise</option>
                {% for ex in exercises %}
                    <option value="{{ ex.id }}">{{ ex.name }}</option>
                {% endfor %}
            </select>

            <input type="number" name="set_number[]" placeholder="Set #" min="1" required>
            <input type="number" name="reps[]" placeholder="Reps" min="1" required>
            <input type="number" step="0.1" name="weight[]" placeholder="Weight" required>

            <select name="weight_unit[]">
                <option value="kg">kg</option>
                <option value="lb">lb</option>
            </select>

            <input type="number" name="set_heart_rate[]" placeholder="HR (optional)">
        `;

        container.appendChild(row);
      }

      function addCardio() {
        const container = document.getElementById("cardio-container");

        const row = document.createElement("div");
        row.className = "cardio-row";

        row.innerHTML = `
            <select name="cardio_exercise_id[]" required>
                <option value="">Select Cardio</option>
                {% for c in cardio_exercises %}
                    <option value="{{ c.id }}">{{ c.name }}</option>
                {% endfor %}
            </select>

            <input type="number" name="duration[]" placeholder="Minutes" min="1" required>
            <input type="number" step="0.1" name="distance[]" placeholder="Distance (km)">
            <input type="number" name="cardio_heart_rate[]" placeholder="HR (optional)">
        `;

        container.appendChild(row);
      }
    </script>
  </body>
</html>
