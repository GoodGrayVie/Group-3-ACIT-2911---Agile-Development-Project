<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fit Folder - Log Workout</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='styles/styles.css') }}"
    />
  </head>
  <body>
    <header>
      <a href="{{ url_for('auth.dashboard') }}" class="logo"
        >Fit<span>Folder</span></a
      >

      <div class="nav-center">
        <a
          href="{{ url_for('workout.log_workout') }}"
          class="btn btn-outline btn-nav"
          >Add Workout</a
        >
        <a
          href="{{ url_for('workout.view_progress') }}"
          class="btn btn-outline btn-nav"
          >Statistics</a
        >
        <a href="#" class="btn btn-outline btn-nav">Recommended</a>
      </div>

      <nav>
        {% if username %}
        <span class="nav-username">{{ username }}</span>
        <a href="{{ url_for('auth.logout') }}" class="btn btn-ghost">Log out</a>
        {% else %}
        <a href="{{ url_for('auth.login') }}" class="btn btn-outline">Login</a>
        <a href="{{ url_for('auth.register') }}" class="btn btn-outline"
          >Register</a
        >
        {% endif %}
      </nav>
    </header>

    <main>
      <h1>Log a workout</h1>

      <form id="workout-form" method="POST" action="/workouts/add">
        <section aria-label="Workout details">
          <div class="form-row">
            <div class="form-group">
              <label for="workout-name">Workout name</label>
              <input
                type="text"
                id="workout-name"
                name="name"
                placeholder="e.g. Monday push day"
                required
              />
            </div>
            <div class="form-group">
              <label for="workout-date">Date</label>
              <input type="date" id="workout-date" name="date" required />
            </div>
          </div>

          <fieldset>
            <legend>Workout type</legend>
            <label class="type-label">
              <input type="radio" name="workout-type" value="weights" checked />
              Weights
            </label>
            <label class="type-label">
              <input type="radio" name="workout-type" value="cardio" /> Cardio
            </label>
          </fieldset>

          <fieldset>
            <legend>Weight unit</legend>
            <label class="type-label">
              <input type="radio" name="weight-unit" value="kg" checked /> kg
            </label>
            <label class="type-label">
              <input type="radio" name="weight-unit" value="lb" /> lb
            </label>
          </fieldset>

          <div class="form-group">
            <label for="exercise-select">Exercise</label>
            <select id="exercise-select">
              <option value="">Select exercise...</option>
            </select>
          </div>

          <div class="form-actions">
            <button type="button" id="add-set-btn" class="btn-ghost">
              + Add set
            </button>
          </div>
        </section>

        <section aria-label="This session">
          <h2>This session</h2>
          <div id="session-log">
            <p id="empty-message">No exercises added yet.</p>
          </div>
          <div class="save-row">
            <button type="submit" class="btn-accent">Save workout</button>
          </div>
        </section>
      </form>
    </main>

    <!-- Exercise data injected by Flask route -->
    <script>
      const exercises = {{ exercises_json | safe }};
    </script>
    <script src="{{ url_for('static', filename='js/log_workout.js') }}"></script>
  </body>
</html>
